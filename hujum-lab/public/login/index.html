<!doctype html>
<html lang="uz">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LMS Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&family=Rajdhani:wght@600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./styles.css?v=20260421-lms-3" />
  </head>
  <body>
    <main class="shell">
      <section class="showcase" aria-hidden="true">
        <img
          class="study-illustration"
          src="https://lms.tuit.uz/assets/images/study.svg"
          alt="Talaba stulda otirgan holatda oqiyotgan illustration"
          loading="eager"
        />
      </section>

      <section class="auth-panel">
        <div class="uni-block">
          <p class="uni-line">MUHAMMAD AL-XORAZMIY NOMIDAGI</p>
          <p class="uni-line">TOSHKENT AXBOROT TEXNOLOGIYALARI UNIVERSITETI</p>
          <img
            class="uni-logo"
            src="https://lms.tuit.uz/assets/images/logo-md.png"
            alt="TATU logosi"
            loading="eager"
          />
        </div>

        <h1>LEARNING MANAGEMENT SYSTEM</h1>

        <form id="auth-form" class="form-stack" novalidate>
          <label class="field-label" for="login-input">Login</label>
          <input id="login-input" name="login" type="text" placeholder="Loginni kiriting" autocomplete="username" />

          <label class="field-label" for="password-input">Parol</label>
          <div class="password-wrap">
            <input id="password-input" name="password" type="password" placeholder="Parolni kiriting" autocomplete="current-password" />
            <button id="toggle-password" class="toggle-btn" type="button" aria-label="Parolni ko'rsatish" title="Parolni ko'rsatish yoki yashirish">
              <svg class="eye eye-open" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                <path d="M12 5.5c5.2 0 9.3 4.2 10.6 6.2a.6.6 0 0 1 0 .6C21.3 14.3 17.2 18.5 12 18.5S2.7 14.3 1.4 12.3a.6.6 0 0 1 0-.6C2.7 9.7 6.8 5.5 12 5.5Zm0 1.7a5 5 0 1 0 0 10 5 5 0 0 0 0-10Zm0 2.1a2.9 2.9 0 1 1 0 5.8 2.9 2.9 0 0 1 0-5.8Z" />
              </svg>
              <svg class="eye eye-off" viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                <path d="m3.2 2 18.8 18.8-1.2 1.2-3.4-3.4a11.9 11.9 0 0 1-5.4 1.4c-5.2 0-9.4-4.2-10.7-6.3a.8.8 0 0 1 0-.8A16.4 16.4 0 0 1 6 7L2 3.2 3.2 2Zm6 6 1.6 1.6A3.1 3.1 0 0 0 9 12c0 .4.1.8.2 1.2l1.6 1.6A3.1 3.1 0 0 1 9.2 8Zm2.9 2.9 3.1 3.1c0-.2.1-.5.1-.8a3.1 3.1 0 0 0-3.2-3.1Zm-.1-6.9c5.2 0 9.4 4.2 10.7 6.3a.8.8 0 0 1 0 .8A16.5 16.5 0 0 1 19 15l-1.4-1.4a14.9 14.9 0 0 0 3.3-3 15 15 0 0 0-8.8-4.8 11 11 0 0 0-1.5.2L8.9 4.3a13.2 13.2 0 0 1 3.1-.3Z" />
              </svg>
            </button>
          </div>

          <button class="submit-btn" type="submit">Kirish</button>
        </form>

        <p id="form-message" class="form-message" role="status" aria-live="polite"></p>
        <p class="auth-foot">Copyright © 2021 of Tashkent University of Information Technologies</p>
      </section>
    </main>

    <script>
      const API_BASE = '/hujum/api';
      const authForm = document.getElementById('auth-form');
      const formMessage = document.getElementById('form-message');
      const togglePassword = document.getElementById('toggle-password');
      const passwordInput = document.getElementById('password-input');
      const submitBtn = authForm.querySelector('.submit-btn');

      function setMessage(message, type) {
        formMessage.textContent = message;
        formMessage.className = 'form-message ' + (type || '');
      }

      togglePassword.addEventListener('click', () => {
        const nextType = passwordInput.type === 'password' ? 'text' : 'password';
        passwordInput.type = nextType;
        togglePassword.classList.toggle('is-visible', nextType === 'text');
        togglePassword.setAttribute(
          'aria-label',
          nextType === 'text' ? "Parolni yashirish" : "Parolni ko'rsatish"
        );
      });

      authForm.addEventListener('submit', async (event) => {
        event.preventDefault();

        const login = document.getElementById('login-input').value.trim();
        const password = passwordInput.value;

        if (!login || !password) {
          setMessage('Login va parolni toliq kiriting.', 'is-error');
          return;
        }

        submitBtn.disabled = true;
        submitBtn.textContent = 'Tekshirilmoqda...';
        setMessage('', '');

        try {
          const response = await fetch(API_BASE + '/lms-login-vuln', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
            },
            body: JSON.stringify({ login, password, mode: 'auth-bypass' }),
          });

          const payload = await response.json();

          if (!response.ok || !payload.ok || !payload.authenticated) {
            setMessage(payload.message || 'Login yoki parol noto\'g\'ri.', 'is-error');
            return;
          }

          if (payload.sessionToken) {
            sessionStorage.setItem('hujumSessionToken', payload.sessionToken);
            sessionStorage.setItem('hujumUser', JSON.stringify(payload.user || {}));
          }
          
          setMessage('Kirish muvaffaqiyatli. Dashboard ochilmoqda...', 'is-success');

          setTimeout(() => {
            window.location.href = '/hujum/dashboard/';
          }, 1000);
        } catch (error) {
          setMessage('Tarmoq xatosi: ' + error.message, 'is-error');
        } finally {
          submitBtn.disabled = false;
          submitBtn.textContent = 'Kirish';
        }
      });
    </script>
  </body>
</html>
